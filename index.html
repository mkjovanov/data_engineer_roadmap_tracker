const fd=s=>new Date(s+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});

function gd(due,status){
  if(status==="done")return{col:"var(--su)",lb:"done"};
  const t=new Date();t.setHours(0,0,0,0);
  const d=Math.ceil((new Date(due+"T00:00:00")-t)/86400000);
  if(d<0)return{col:"var(--da)",lb:`${-d}d late`};
  if(d===0)return{col:"var(--wa)",lb:"due today"};
  if(d<=7)return{col:"var(--wa)",lb:`${d}d left`};
  return{col:"var(--t3)",lb:`${d}d left`};
}
function timeSince(iso){
  if(!iso)return"";const d=Math.floor((Date.now()-new Date(iso))/1000);
  if(d<10)return"just now";if(d<60)return d+"s ago";
  if(d<3600)return Math.floor(d/60)+"m ago";return Math.floor(d/3600)+"h ago";
}

function migrateStatus(s){
  if(!s)return{};const r={};
  for(const[k,v]of Object.entries(s)){
    if(v===true)r[k]="done";else if(v==="done"||v==="progress")r[k]=v;else r[k]=null;

}

// GitHub API
function parseRepo(s){const p=(s||"").trim().split("/");return p.length===2&&p[0]&&p[1]?{owner:p[0],repo:p[1]}:null;}
async function ghGet(token,owner,repo,path){
  const res=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${encodeURIComponent(path)}`,
    {headers:{"Authorization":`Bearer ${token}`,"Accept":"application/vnd.github+json","X-GitHub-Api-Version":"2022-11-28"}});
  if(res.status===404)return null;
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.message||`GitHub ${res.status}`);}
  const d=await res.json();
  return{content:JSON.parse(atob(d.content.replace(/\s/g,""))),sha:d.sha};
}
async function ghPut(token,owner,repo,path,content,sha){
  const body={message:"Update DE tracker state",content:btoa(JSON.stringify(content,null,2))};
  if(sha)body.sha=sha;
  const res=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${encodeURIComponent(path)}`,
    {method:"PUT",headers:{"Authorization":`Bearer ${token}`,"Accept":"application/vnd.github+json","X-GitHub-Api-Version":"2022-11-28","Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.message||`GitHub ${res.status}`);}
  return(await res.json()).content.sha;
}

// Anthropic API
async function callClaude(messages,system,apiKey){
  if(!apiKey)throw new Error("No API key — click Settings");
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system,messages})
  });
  if(!res.ok){let m=`HTTP ${res.status}`;try{const j=await res.json();m=j?.error?.message||m;}catch{}throw new Error(m);}
  const data=await res.json();
  if(data.error)throw new Error(data.error.message||"API error");
  const text=data.content?.find(b=>b.type==="text")?.text;
  if(!text)throw new Error("Empty response");
  return text;
}

function pct(mid,st){const m=MO.find(x=>x.id===mid);return m?Math.round(m.tasks.filter(t=>st[t.id]==="done").length/m.tasks.length*100):0;}
function getCur(st){for(let i=MO.length-1;i>=0;i--)if(pct(MO[i].id,st)>0||MO[i].tasks.some(t=>st[t.id]==="progress"))return i;return 0;}

          h("div",{style:{display:"flex",gap:10,flexWrap:"wrap"}},
            h("button",{className:"pb",onClick:()=>{setSelM(curI);setTab("tasks");}},"View tasks"),
            h("button",{className:"sb",onClick:()=>setTab("quiz")},"Quiz me"),
            h("button",{className:"sb",onClick:()=>setTab("mentor")},"Mentor")
          )
        )
      ),

      // ── TASKS ──
      tab==="tasks"&&h("div",null,
        h(MonthTabsMobile),
        h("div",{className:"tasks-layout"},
          // Desktop sidebar
          h("div",{className:"tasks-sidebar"},
            h("div",{style:{background:"var(--bg1)",border:"1px solid var(--bd)",borderRadius:r,padding:"12px 14px",marginBottom:14}},
              h("p",{style:{fontSize:11,color:"var(--t3)",textTransform:"uppercase",letterSpacing:1,margin:"0 0 8px"}},"Tap to cycle status"),
              [{label:"Todo",border:"var(--bd2)",bg:"transparent",content:null},
               {label:"In progress",border:"var(--wa)",bg:"var(--wa-bg)",content:h("div",{style:{width:10,height:3,background:"var(--wa)",borderRadius:2}})},
               {label:"Done",border:"var(--su)",bg:"var(--su)",content:ic("ti-check",{fontSize:11,color:"#fff"})}
              ].map(({label,border,bg,content})=>h("div",{key:label,style:{display:"flex",alignItems:"center",gap:8,marginBottom:6}},
                h("div",{style:{width:18,height:18,borderRadius:4,border:`1.5px solid ${border}`,background:bg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},content),
                h("span",{style:{fontSize:13,color:"var(--t2)"}},label)
              ))
            ),
            MO.map((mn,i)=>{
              const p=pct(mn.id,st);const c=RL[i];
              const done2=mn.tasks.filter(t=>st[t.id]==="done").length;
              const prog2=mn.tasks.filter(t=>st[t.id]==="progress").length;
              const late=mn.tasks.filter(t=>st[t.id]!=="done"&&gd(t.due,st[t.id]).lb.includes("late")).length;
              return h("button",{key:mn.id,onClick:()=>setSelM(i),style:{width:"100%",textAlign:"left",padding:"11px 13px",borderRadius:r,marginBottom:4,background:selM===i?c.bg:"transparent",border:`1px solid ${selM===i?c.b:"transparent"}`,cursor:"pointer",fontFamily:fn}},
                h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
                  h("span",{style:{fontSize:11,color:c.t,fontFamily:mo}},"M"+mn.id+" · "+p+"%"),
                  h("div",{style:{display:"flex",gap:3}},late>0&&h("span",{style:{fontSize:10,color:"var(--da)"}},late+"!"),prog2>0&&h("span",{style:{fontSize:10,color:"var(--wa)"}},prog2+"⟳"))
                ),
                h("div",{style:{fontSize:13,fontWeight:selM===i?500:400,color:selM===i?"var(--t1)":"var(--t2)",marginTop:3}},mn.title),
                h("div",{style:{fontSize:10,color:"var(--t3)",marginTop:2}},fr(mn.start,mn.end)),
                h("div",{style:{display:"flex",alignItems:"center",gap:5,marginTop:5}},
                  h("div",{style:{flex:1,height:3,background:"var(--bd2)",borderRadius:2,overflow:"hidden"}},h("div",{style:{width:`${p}%`,height:"100%",background:c.t,borderRadius:2}})),
                  h("span",{style:{fontSize:10,color:"var(--t3)",fontFamily:mo,flexShrink:0}},`${done2}/${mn.tasks.length}`)
                )
              );
            })
          ),
          // Main task area
          (()=>{
            const mn=MO[selM];const p=pct(mn.id,st);const c=RL[selM];
            const done2=mn.tasks.filter(t=>st[t.id]==="done").length;
            const prog2=mn.tasks.filter(t=>st[t.id]==="progress").length;
            const late=mn.tasks.filter(t=>st[t.id]!=="done"&&gd(t.due,st[t.id]).lb.includes("late")).length;
            const bookIds=[...new Set(mn.tasks.filter(t=>t.bookId).map(t=>t.bookId))];
            return h("div",null,
              h("div",{style:{marginBottom:16}},
                h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:5,gap:10}},
                  h("div",null,
                    h("p",{style:{fontSize:18,fontWeight:500,color:c.t,margin:"0 0 2px"}},mn.title),
                    h("p",{style:{fontSize:12,color:"var(--t3)",margin:0,fontFamily:mo}},fr(mn.start,mn.end)),
                    h("p",{style:{fontSize:13,color:"var(--t2)",margin:"3px 0 0"}},mn.goal)
                  ),
                  h("div",{style:{textAlign:"right",flexShrink:0}},
                    h("div",{style:{fontSize:13,color:"var(--su)",fontFamily:mo}},done2+" done"),
                    prog2>0&&h("div",{style:{fontSize:13,color:"var(--wa)",fontFamily:mo}},prog2+" in progress"),
                    late>0&&h("div",{style:{fontSize:13,color:"var(--da)",fontFamily:mo}},late+" overdue")
                  )
                ),
                h("div",{style:{height:5,background:"var(--bd2)",borderRadius:4,overflow:"hidden",marginTop:10}},h("div",{style:{width:`${p}%`,height:"100%",background:c.t,borderRadius:4}}))
              ),
              bookIds.length>0&&h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:10,marginBottom:14}},
                bookIds.map(id=>h(BookCard,{key:id,bookId:id,compact:true}))
              ),
              h("div",{style:{marginBottom:14}},
                mn.tasks.map(task=>{
                  const status=st[task.id];const ds=gd(task.due,status);
                  const isDone=status==="done";const isProg=status==="progress";
                  return h("div",{key:task.id,className:"task-r",onClick:()=>cycleStatus(task.id),style:{background:isDone?"var(--bg2)":isProg?"var(--wa-bg)":"var(--bg1)",border:`1px solid ${isDone?c.b:isProg?"var(--wa-bd)":ds.lb.includes("late")?"var(--da-bd)":"var(--bd)"}`}},
                    h(StatusBtn,{taskId:task.id}),
                    h("div",{style:{flex:1,minWidth:0}},
                      h("p",{style:{fontSize:14,color:isDone?"var(--t3)":"var(--t1)",textDecoration:isDone?"line-through":"none",margin:"0 0 5px",lineHeight:1.5}},task.text),
                      h("div",{style:{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}},
                        badge(task.tag),
                        isProg&&h("span",{style:{fontSize:11,color:"var(--wa)",background:"var(--wa-bg)",border:"1px solid var(--wa-bd)",padding:"1px 6px",borderRadius:4,fontFamily:mo}},"in progress")
                      ),
                      task.bookId&&h(BookMini,{bookId:task.bookId})
                    ),
                    h("div",{style:{flexShrink:0,textAlign:"right",marginLeft:8}},
                      h("div",{style:{fontSize:12,color:ds.col,fontFamily:mo,fontWeight:500}},fd(task.due)),
                      h("div",{style:{fontSize:11,color:ds.col,marginTop:2}},ds.lb)
                    )
                  );
                })
              ),
              h("div",{style:{background:"var(--bg2)",border:"1px solid var(--bd)",borderRadius:r,padding:"14px 16px"}},
                h("p",{style:{fontSize:11,color:"var(--t3)",margin:"0 0 5px",textTransform:"uppercase",letterSpacing:1}},"Milestone · "+fd(mn.end)),
                h("p",{style:{fontSize:14,color:"var(--t1)",margin:0,lineHeight:1.65}},mn.ms)
              )
            );
          })()
        )
      ),

      // ── QUIZ ──
      tab==="quiz"&&h("div",null,
        !apiKey&&noKeyBanner,
        apiKey&&h("div",null,
          h("p",{style:{fontSize:16,fontWeight:500,margin:"0 0 16px"}},"Choose a topic to test your knowledge"),
          h("div",{className:"quiz-grid"},
            MO.map((mn,i)=>{const c=RL[i];
              return h("div",{key:mn.id,style:{background:"var(--bg1)",border:"1px solid var(--bd)",borderRadius:r,padding:"16px 18px"}},
                h("p",{style:{fontSize:11,color:c.t,fontFamily:mo,margin:"0 0 10px",textTransform:"uppercase",letterSpacing:1}},`Month ${mn.id} — ${mn.title}`),
                h("div",{style:{display:"flex",flexWrap:"wrap",gap:8}},
                  mn.qz.map(topic=>h("button",{key:topic,onClick:()=>startQ(topic,i),style:{padding:"9px 14px",background:"var(--bg2)",border:"1px solid var(--bd)",borderRadius:r,color:"var(--t2)",fontSize:14,cursor:"pointer",fontFamily:fn,minHeight:44}},topic))
                )
              );
            })
          ),
          qLoad&&h("div",{style:{background:"var(--bg1)",border:"1px solid var(--bd)",borderRadius:12,padding:32,textAlign:"center",color:"var(--t3)",fontSize:15}},"Generating question…"),
          quiz&&!qLoad&&(quiz.err
            ?h("div",{style:{background:"var(--da-bg)",border:"1px solid var(--da-bd)",borderRadius:r,padding:"16px 20px",color:"var(--da)",fontSize:15}},quiz.msg||"Failed — try another topic.")
            :h("div",{style:{background:"var(--bg1)",border:"1px solid var(--bd)",borderRadius:12,padding:"20px"}},
              h("p",{style:{fontSize:11,color:"var(--t3)",margin:"0 0 8px",fontFamily:mo}},quiz.topic),
              h("p",{style:{fontSize:17,fontWeight:500,margin:"0 0 16px",lineHeight:1.55}},quiz.question),
              h("div",{style:{display:"flex",flexDirection:"column",gap:8}},
                Object.entries(quiz.options).map(([k,v])=>{
                  let bg="var(--bg2)",border="var(--bd)",col="var(--t1)";
                  if(quiz.rev){if(k===quiz.correct){bg="var(--su-bg)";border="var(--su-bd)";col="var(--su)";}else if(k===quiz.sel){bg="var(--da-bg)";border="var(--da-bd)";col="var(--da)";}}
                  return h("button",{key:k,onClick:()=>ans(k),disabled:quiz.rev,style:{padding:"13px 16px",background:bg,border:`1px solid ${border}`,borderRadius:r,color:col,fontSize:15,cursor:quiz.rev?"default":"pointer",textAlign:"left",fontFamily:fn,minHeight:50}},
                    h("span",{style:{fontFamily:mo,fontWeight:500,marginRight:9}},k.toUpperCase()+"."),v);
                })
              ),
              quiz.rev&&h("div",null,
                h("div",{style:{marginTop:14,padding:"13px 16px",background:"var(--bg2)",border:"1px solid var(--bd)",borderRadius:r,fontSize:14,color:"var(--t2)",lineHeight:1.65}},h("span",{style:{color:"var(--su)",fontWeight:500}},"Explanation: "),quiz.explanation),
                h("button",{className:"pb",style:{marginTop:12},onClick:()=>startQ(quiz.topic,quiz.mi)},"Next question")
              )
            )
          ),
          qH.length>0&&h("div",{style:{marginTop:22}},
            h("p",{style:{fontSize:11,color:"var(--t3)",fontFamily:mo,textTransform:"uppercase",margin:"0 0 8px"}},"Recent history"),
            qH.slice(0,6).map((q,i)=>h("div",{key:i,style:{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid var(--bd)"}},
              ic(`ti-${q.ok?"circle-check":"circle-x"}`,{fontSize:17,color:q.ok?"var(--su)":"var(--da)",flexShrink:0}),
              h("span",{style:{fontSize:14,color:"var(--t2)",flex:1}},q.topic),
              h("span",{style:{fontSize:12,color:"var(--t3)",fontFamily:mo}},`M${q.mi+1}`)
            ))
          )
        )
      ),

      // ── MENTOR ──
      tab==="mentor"&&h("div",null,
        !apiKey&&noKeyBanner,
        apiKey&&h("div",null,
          h("div",{style:{background:"var(--bg1)",border:"1px solid var(--bd)",borderRadius:12,overflow:"hidden"}},
            h("div",{style:{padding:"14px 18px",borderBottom:"1px solid var(--bd)",display:"flex",alignItems:"center",gap:10}},
              ic("ti-school",{fontSize:18,color:"var(--ac)"}),
              h("span",{style:{fontSize:16,fontWeight:500}},"DE mentor"),
              h("span",{style:{fontSize:13,color:"var(--t3)",marginLeft:"auto",fontFamily:mo}},`M${curI+1} · ${doneN} done`)
            ),
            h("div",{style:{height:"calc(100dvh - 300px)",minHeight:320,maxHeight:600,overflowY:"auto",padding:16,WebkitOverflowScrolling:"touch"}},
              msgs.length===0&&h("div",{style:{color:"var(--t3)",fontSize:15,textAlign:"center",paddingTop:60}},
                ic("ti-messages",{fontSize:32,display:"block",margin:"0 auto 10px"}),
                "Ask me anything about your DE transition.",h("br"),"I know where you are in the plan."
              ),
              msgs.map((m,i)=>h("div",{key:i,style:{marginBottom:10,display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}},
                h("div",{style:{maxWidth:"85%",padding:"10px 14px",borderRadius:10,fontSize:14,lineHeight:1.6,whiteSpace:"pre-wrap",background:m.role==="user"?"#2563EB":"var(--bg2)",color:m.role==="user"?"#fff":"var(--t1)",border:m.role==="user"?"none":`1px solid var(--bd)`}},m.content)
              )),
              cLoad&&h("div",{style:{color:"var(--t3)",fontSize:14,padding:"4px 0"}},ic("ti-dots",{fontSize:16,marginRight:6}),"Thinking…"),
              h("div",{ref:endR})
            ),
            chatErr&&h("div",{style:{padding:"10px 16px",background:"var(--da-bg)",borderTop:"1px solid var(--da-bd)",display:"flex",alignItems:"center",gap:8}},
              ic("ti-alert-circle",{fontSize:15,color:"var(--da)",flexShrink:0}),
              h("span",{style:{fontSize:13,color:"var(--da)",flex:1}},chatErr),
              h("button",{onClick:()=>setCE(null),style:{border:"none",background:"transparent",color:"var(--da)",cursor:"pointer",fontSize:16,padding:0,minWidth:32,minHeight:32}},"✕")
            ),
            h("div",{style:{padding:"12px 14px",borderTop:"1px solid var(--bd)",display:"flex",gap:8}},
              h("input",{type:"text",value:inp,onChange:e=>setInp(e.target.value),onKeyDown:e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}},placeholder:"Ask your mentor…",disabled:cLoad,style:{flex:1}}),
              h("button",{className:"pb",onClick:send,disabled:cLoad||!inp.trim(),style:{padding:"10px 16px"}},cLoad?"…":"Send")
            )
          ),
          h("div",{style:{marginTop:12,display:"flex",flexWrap:"wrap",gap:8}},
            ["What should I focus on this week?",`What's hardest about month ${curI+1}?`,"Am I on track for Jan 10?","What will interviewers ask?"]
            .map(p=>h("button",{key:p,onClick:()=>setInp(p),style:{padding:"9px 13px",background:"transparent",border:"1px solid var(--bd)",borderRadius:r,color:"var(--t2)",fontSize:13,cursor:"pointer",fontFamily:fn,minHeight:44}},p))
          )
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
