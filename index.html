const fd=s=>new Date(s+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});

function gd(due,status){
  if(status==="done")return{col:"var(--su)",lb:"done"};
  const t=new Date();t.setHours(0,0,0,0);
  const d=Math.ceil((new Date(due+"T00:00:00")-t)/86400000);
  if(d<0)return{col:"var(--da)",lb:`${-d}d late`};
  if(d===0)return{col:"var(--wa)",lb:"due today"};
  if(d<=7)return{col:"var(--wa)",lb:`${d}d left`};
  return{col:"var(--t3)",lb:`${d}d left`};
}
function timeSince(iso){
  if(!iso)return"";
  const d=Math.floor((Date.now()-new Date(iso))/1000);
  if(d<10)return"just now";
  if(d<60)return d+"s ago";
  if(d<3600)return Math.floor(d/60)+"m ago";
  return Math.floor(d/3600)+"h ago";
}

const ls=k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}};

function migrateStatus(saved){
  if(!saved)return{};const r={};
  for(const[k,v]of Object.entries(saved)){
    if(v===true)r[k]="done";else if(v==="done"||v==="progress")r[k]=v;else r[k]=null;
  }
  return r;
}

// ── GitHub API ────────────────────────────────────────────────────────────────
function parseRepo(s){
  const p=(s||"").trim().split("/");
  return p.length===2&&p[0]&&p[1]?{owner:p[0],repo:p[1]}:null;
}
async function ghGet(token,owner,repo,path){
  const res=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${encodeURIComponent(path)}`,{
    headers:{"Authorization":`Bearer ${token}`,"Accept":"application/vnd.github+json","X-GitHub-Api-Version":"2022-11-28"}
  });
  if(res.status===404)return null;
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.message||`GitHub ${res.status}`);}
  const data=await res.json();
  return{content:JSON.parse(atob(data.content.replace(/\s/g,""))),sha:data.sha};
}
async function ghPut(token,owner,repo,path,content,sha){
  const body={message:"Update DE tracker state",content:btoa(JSON.stringify(content,null,2))};
  if(sha)body.sha=sha;
  const res=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${encodeURIComponent(path)}`,{
    method:"PUT",
    headers:{"Authorization":`Bearer ${token}`,"Accept":"application/vnd.github+json","X-GitHub-Api-Version":"2022-11-28","Content-Type":"application/json"},
    body:JSON.stringify(body)
  });
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.message||`GitHub ${res.status}`);}
  return(await res.json()).content.sha;
}

// ── Anthropic API ─────────────────────────────────────────────────────────────
async function callClaude(messages,system,apiKey){
  if(!apiKey)throw new Error("No API key — click Settings");
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system,messages})
  });
  if(!res.ok){let m=`HTTP ${res.status}`;try{const j=await res.json();m=j?.error?.message||m;}catch{}throw new Error(m);}
  const data=await res.json();
  if(data.error)throw new Error(data.error.message||"API error");
  const text=data.content?.find(b=>b.type==="text")?.text;
  if(!text)throw new Error("Empty response");
  return text;
}

function pct(mid,st){const m=MO.find(x=>x.id===mid);return m?Math.round(m.tasks.filter(t=>st[t.id]==="done").length/m.tasks.length*100):0;}
function getCur(st){
  for(let i=MO.length-1;i>=0;i--)
    if(pct(MO[i].id,st)>0||MO[i].tasks.some(t=>st[t.id]==="progress"))return i;
  return 0;
}

function App(){
  const[theme,setTheme]=useState(()=>ls("de_theme")||(window.matchMedia?.("(prefers-color-scheme:dark)").matches?"dark":"light"));
  const[tab,setTab]=useState("dashboard");
  const[st,setSt]=useState(()=>migrateStatus(ls("de_status")||ls("de_prog")||{}));
  const[selM,setSelM]=useState(0);
  const[apiKey,setApiKey]=useState(()=>ls("de_apikey")||"");
  const[keyInp,setKeyInp]=useState("");
  const[showSettings,setShowSettings]=useState(false);
  const[bp,setBp]=useState(()=>ls("de_books")||{});
  const[bpInp,setBpInp]=useState(()=>{const i={};Object.keys(BOOKS).forEach(id=>{i[id]=String(ls("de_books")?.[id]||0);});return i;});
  const[quiz,setQuiz]=useState(null);
  const[qLoad,setQL]=useState(false);
  const[qH,setQH]=useState(()=>ls("de_qhist")||[]);
  const[msgs,setMsgs]=useState([]);
  const[inp,setInp]=useState("");
  const[cLoad,setCL]=useState(false);
  const[chatErr,setCE]=useState(null);

  // GitHub sync state
  const[gh,setGh]=useState(()=>ls("de_gh")||{enabled:false,token:"",repo:"",path:"de-tracker-state.json"});
  const[ghInp,setGhInp]=useState({token:"",repo:"",path:"de-tracker-state.json"});
  const[sync,setSync]=useState({status:"idle",lastSync:null,error:null}); // idle|syncing|ok|error

  const endR=useRef(null);
  const ghTimer=useRef(null);
  // Refs so debounced save always has fresh values
  const stRef=useRef(st);const bpRef=useRef(bp);const qHRef=useRef(qH);const ghRef=useRef(gh);
  useEffect(()=>{stRef.current=st;},[st]);
  useEffect(()=>{bpRef.current=bp;},[bp]);
  useEffect(()=>{qHRef.current=qH;},[qH]);
  useEffect(()=>{ghRef.current=gh;},[gh]);

  useEffect(()=>{document.documentElement.setAttribute("data-theme",theme);},[theme]);
  useEffect(()=>{endR.current?.scrollIntoView({behavior:"smooth"});},[msgs,cLoad]);

  // ── GitHub sync helpers ──
  function buildPayload(){
    return{
      version:1,
      lastUpdated:new Date().toISOString(),
      taskStatus:stRef.current,
      bookProgress:bpRef.current,
      quizHistory:qHRef.current.slice(0,50),
    };
  }

  async function doGhSave(){
    const cfg=ghRef.current;
    if(!cfg.enabled||!cfg.token||!cfg.repo)return;
    const parsed=parseRepo(cfg.repo);
    if(!parsed)return;
    setSync(s=>({...s,status:"syncing"}));
    try{
      const existing=await ghGet(cfg.token,parsed.owner,parsed.repo,cfg.path);
      await ghPut(cfg.token,parsed.owner,parsed.repo,cfg.path,buildPayload(),existing?.sha);
      setSync({status:"ok",lastSync:new Date().toISOString(),error:null});
    }catch(e){
      console.error("GitHub save:",e);
      setSync(s=>({...s,status:"error",error:e.message}));
    }
  }

  function scheduleGhSave(){
    if(!ghRef.current.enabled||!ghRef.current.token||!ghRef.current.repo)return;
    if(ghTimer.current)clearTimeout(ghTimer.current);
    setSync(s=>s.status!=="syncing"?{...s,status:"pending"}:s);
    ghTimer.current=setTimeout(doGhSave,2500);
  }

  async function pullFromGitHub(cfg){
    const c=cfg||ghRef.current;
    if(!c.enabled||!c.token||!c.repo)return;
    const parsed=parseRepo(c.repo);if(!parsed)return;
    setSync(s=>({...s,status:"syncing"}));
    try{
      const result=await ghGet(c.token,parsed.owner,parsed.repo,c.path);
      if(result){
        const{content}=result;
        if(content.taskStatus){const m=migrateStatus(content.taskStatus);setSt(m);ss("de_status",m);}
        if(content.bookProgress){
          setBp(content.bookProgress);ss("de_books",content.bookProgress);
          const i={};Object.keys(BOOKS).forEach(id=>{i[id]=String(content.bookProgress[id]||0);});
          setBpInp(i);
        }
        if(content.quizHistory){setQH(content.quizHistory);ss("de_qhist",content.quizHistory);}
      }
      setSync({status:"ok",lastSync:new Date().toISOString(),error:null});
    }catch(e){
      console.error("GitHub pull:",e);
      setSync({status:"error",lastSync:null,error:e.message});
    }
  }

  // Load from GitHub on mount if configured
  useEffect(()=>{
    if(gh.enabled&&gh.token&&gh.repo)pullFromGitHub(gh);
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[]);

  // Auto-save to GitHub when st/bp/qH change (skip first render)
  const firstRender=useRef(true);
  useEffect(()=>{
    if(firstRender.current){firstRender.current=false;return;}
    scheduleGhSave();
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[st,bp,qH]);

  // ── State mutators ──
  const cycleStatus=useCallback(id=>{
    setSt(prev=>{
      const cur=prev[id];
      const next=cur==="done"?null:cur==="progress"?"done":"progress";
      const n={...prev,[id]:next};ss("de_status",n);return n;
    });
  },[]);

  const updateBp=useCallback((bookId,rawVal)=>{
    const val=Math.min(BOOKS[bookId].totalPages,Math.max(0,parseInt(rawVal)||0));
    setBp(prev=>{const n={...prev,[bookId]:val};ss("de_books",n);return n;});
    setBpInp(prev=>({...prev,[bookId]:String(val)}));
  },[]);

  const toggleTheme=()=>setTheme(t=>{const n=t==="dark"?"light":"dark";ss("de_theme",n);return n;});
  const saveApiKey=()=>{const k=keyInp.trim();if(k){setApiKey(k);ss("de_apikey",k);setKeyInp("");}};
  const clearApiKey=()=>{setApiKey("");ss("de_apikey","");};
  const saveGhSettings=()=>{
    const newGh={enabled:true,token:ghInp.token.trim(),repo:ghInp.repo.trim(),path:ghInp.path.trim()||"de-tracker-state.json"};
    setGh(newGh);ss("de_gh",newGh);

          const mn=MO[selM];const p=pct(mn.id,st);const c=RL[selM];
          const done2=mn.tasks.filter(t=>st[t.id]==="done").length;
          const prog2=mn.tasks.filter(t=>st[t.id]==="progress").length;
          const late=mn.tasks.filter(t=>st[t.id]!=="done"&&gd(t.due,st[t.id]).lb.includes("late")).length;
          const bookIds=[...new Set(mn.tasks.filter(t=>t.bookId).map(t=>t.bookId))];
          return h("div",null,
            h("div",{style:{marginBottom:18}},
              h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}},
                h("div",null,
                  h("p",{style:{fontSize:19,fontWeight:500,color:c.t,margin:"0 0 2px"}},mn.title),
                  h("p",{style:{fontSize:13,color:"var(--t3)",margin:0,fontFamily:mo}},fr(mn.start,mn.end)),
                  h("p",{style:{fontSize:14,color:"var(--t2)",margin:"4px 0 0"}},mn.goal)
                ),
                h("div",{style:{textAlign:"right",flexShrink:0}},
                  h("div",{style:{display:"flex",gap:12,justifyContent:"flex-end"}},
                    h("span",{style:{fontSize:14,color:"var(--su)",fontFamily:mo}},done2+" done"),
                    prog2>0&&h("span",{style:{fontSize:14,color:"var(--wa)",fontFamily:mo}},prog2+" in progress"),
                    late>0&&h("span",{style:{fontSize:14,color:"var(--da)",fontFamily:mo}},late+" overdue")
                  )
                )
              ),
              h("div",{style:{height:6,background:"var(--bd2)",borderRadius:4,overflow:"hidden",marginTop:12}},
                h("div",{style:{width:`${p}%`,height:"100%",background:c.t,borderRadius:4}})
              )
            ),
            bookIds.length>0&&h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12,marginBottom:18}},
              bookIds.map(id=>h(BookCard,{key:id,bookId:id,compact:true}))
            ),
            h("div",{style:{marginBottom:18}},
              mn.tasks.map(task=>{
                const status=st[task.id];const ds=gd(task.due,status);
                const isDone=status==="done";const isProg=status==="progress";
                return h("div",{key:task.id,className:"task-r",onClick:()=>cycleStatus(task.id),style:{display:"flex",alignItems:"flex-start",gap:14,padding:16,borderRadius:r,marginBottom:6,cursor:"pointer",background:isDone?"var(--bg2)":isProg?"var(--wa-bg)":"var(--bg1)",border:`1px solid ${isDone?c.b:isProg?"var(--wa-bd)":ds.lb.includes("late")?"var(--da-bd)":"var(--bd)"}`,userSelect:"none"}},
                  h(StatusBtn,{taskId:task.id}),
                  h("div",{style:{flex:1,minWidth:0}},
                    h("p",{style:{fontSize:15,color:isDone?"var(--t3)":"var(--t1)",textDecoration:isDone?"line-through":"none",margin:"0 0 6px",lineHeight:1.55}},task.text),
                    h("div",{style:{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}},
                      badge(task.tag),
                      isProg&&h("span",{style:{fontSize:11,color:"var(--wa)",background:"var(--wa-bg)",border:"1px solid var(--wa-bd)",padding:"2px 7px",borderRadius:4,fontFamily:mo}},"in progress")
                    ),
                    task.bookId&&h(BookMini,{bookId:task.bookId})
                  ),
                  h("div",{style:{flexShrink:0,textAlign:"right",marginLeft:10}},
                    h("div",{style:{fontSize:13,color:ds.col,fontFamily:mo,fontWeight:500}},fd(task.due)),
                    h("div",{style:{fontSize:12,color:ds.col,marginTop:2}},ds.lb)
                  )
                );
              })
            ),
            h("div",{style:{background:"var(--bg2)",border:"1px solid var(--bd)",borderRadius:r,padding:"16px 20px"}},
              h("p",{style:{fontSize:12,color:"var(--t3)",margin:"0 0 6px",textTransform:"uppercase",letterSpacing:1}},"Milestone · "+fd(mn.end)),
              h("p",{style:{fontSize:15,color:"var(--t1)",margin:0,lineHeight:1.7}},mn.ms)
            )
          );
        })()
      ),

      // ─── QUIZ ───
      tab==="quiz"&&h("div",null,
        !apiKey&&noKeyBanner,
        apiKey&&h("div",null,
          h("p",{style:{fontSize:16,fontWeight:500,margin:"0 0 18px"}},"Choose a topic to test your knowledge"),
          h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(380px,1fr))",gap:20,marginBottom:28}},
            MO.map((mn,i)=>{const c=RL[i];
              return h("div",{key:mn.id,style:{background:"var(--bg1)",border:"1px solid var(--bd)",borderRadius:r,padding:"18px 20px"}},
                h("p",{style:{fontSize:12,color:c.t,fontFamily:mo,margin:"0 0 10px",textTransform:"uppercase",letterSpacing:1}},`Month ${mn.id} — ${mn.title}`),
                h("div",{style:{display:"flex",flexWrap:"wrap",gap:8}},
                  mn.qz.map(topic=>h("button",{key:topic,className:"qbtn",onClick:()=>startQ(topic,i),style:{"--qtc":c.t,"--qbc":c.b,padding:"7px 14px",background:"var(--bg2)",border:"1px solid var(--bd)",borderRadius:r,color:"var(--t2)",fontSize:14,cursor:"pointer",fontFamily:fn}},topic))
                )
              );
            })
          ),
          qLoad&&h("div",{style:{background:"var(--bg1)",border:"1px solid var(--bd)",borderRadius:12,padding:32,textAlign:"center",color:"var(--t3)",fontSize:15}},"Generating question…"),
          quiz&&!qLoad&&(quiz.err
            ?h("div",{style:{background:"var(--da-bg)",border:"1px solid var(--da-bd)",borderRadius:r,padding:"18px 22px",color:"var(--da)",fontSize:15}},quiz.msg||"Failed — try another topic.")
            :h("div",{style:{background:"var(--bg1)",border:"1px solid var(--bd)",borderRadius:12,padding:26}},
              h("p",{style:{fontSize:12,color:"var(--t3)",margin:"0 0 10px",fontFamily:mo}},quiz.topic),
              h("p",{style:{fontSize:18,fontWeight:500,margin:"0 0 18px",lineHeight:1.6}},quiz.question),
              h("div",{style:{display:"flex",flexDirection:"column",gap:8}},
                Object.entries(quiz.options).map(([k,v])=>{
                  let bg="var(--bg2)",border="var(--bd)",col="var(--t1)";
                  if(quiz.rev){if(k===quiz.correct){bg="var(--su-bg)";border="var(--su-bd)";col="var(--su)";}else if(k===quiz.sel){bg="var(--da-bg)";border="var(--da-bd)";col="var(--da)";}}
                  return h("button",{key:k,onClick:()=>ans(k),disabled:quiz.rev,style:{padding:"14px 18px",background:bg,border:`1px solid ${border}`,borderRadius:r,color:col,fontSize:15,cursor:quiz.rev?"default":"pointer",textAlign:"left",fontFamily:fn}},
                    h("span",{style:{fontFamily:mo,fontWeight:500,marginRight:10}},k.toUpperCase()+"."),v);
                })
              ),
              quiz.rev&&h("div",null,
                h("div",{style:{marginTop:16,padding:"14px 18px",background:"var(--bg2)",border:"1px solid var(--bd)",borderRadius:r,fontSize:15,color:"var(--t2)",lineHeight:1.7}},
                  h("span",{style:{color:"var(--su)",fontWeight:500}},"Explanation: "),quiz.explanation),
                h("button",{className:"pb",style:{marginTop:14},onClick:()=>startQ(quiz.topic,quiz.mi)},"Next question")
              )
            )
          ),
          qH.length>0&&h("div",{style:{marginTop:24}},
            h("p",{style:{fontSize:12,color:"var(--t3)",fontFamily:mo,textTransform:"uppercase",margin:"0 0 10px"}},"Recent history"),
            qH.slice(0,6).map((q,i)=>h("div",{key:i,style:{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:"1px solid var(--bd)"}},
              ic(`ti-${q.ok?"circle-check":"circle-x"}`,{fontSize:18,color:q.ok?"var(--su)":"var(--da)",flexShrink:0}),
              h("span",{style:{fontSize:15,color:"var(--t2)",flex:1}},q.topic),
              h("span",{style:{fontSize:13,color:"var(--t3)",fontFamily:mo}},`M${q.mi+1}`)
            ))
          )
        )
      ),

      // ─── MENTOR ───
      tab==="mentor"&&h("div",null,
        !apiKey&&noKeyBanner,
        apiKey&&h("div",null,
          h("div",{style:{background:"var(--bg1)",border:"1px solid var(--bd)",borderRadius:12,overflow:"hidden"}},
            h("div",{style:{padding:"16px 22px",borderBottom:"1px solid var(--bd)",display:"flex",alignItems:"center",gap:10}},
              ic("ti-school",{fontSize:20,color:"var(--ac)"}),
              h("span",{style:{fontSize:17,fontWeight:500}},"DE mentor"),
              h("span",{style:{fontSize:14,color:"var(--t3)",marginLeft:"auto",fontFamily:mo}},`Month ${curI+1} · ${doneN} done · ${progN} in progress`)
            ),
            h("div",{style:{height:"calc(100vh - 340px)",minHeight:400,overflowY:"auto",padding:20}},
              msgs.length===0&&h("div",{style:{color:"var(--t3)",fontSize:15,textAlign:"center",paddingTop:80}},
                ic("ti-messages",{fontSize:36,display:"block",margin:"0 auto 12px"}),
                "Ask me anything about your DE transition.",h("br"),"I know where you are in the plan."
              ),
              msgs.map((m,i)=>h("div",{key:i,style:{marginBottom:12,display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}},
                h("div",{style:{maxWidth:"80%",padding:"12px 16px",borderRadius:10,fontSize:15,lineHeight:1.65,whiteSpace:"pre-wrap",background:m.role==="user"?"#2563EB":"var(--bg2)",color:m.role==="user"?"#fff":"var(--t1)",border:m.role==="user"?"none":`1px solid var(--bd)`}},m.content)
              )),
              cLoad&&h("div",{style:{color:"var(--t3)",fontSize:15,padding:"6px 0"}},ic("ti-dots",{fontSize:18,marginRight:8}),"Thinking…"),
              h("div",{ref:endR})
            ),
            chatErr&&h("div",{style:{padding:"12px 18px",background:"var(--da-bg)",borderTop:"1px solid var(--da-bd)",display:"flex",alignItems:"center",gap:10}},
              ic("ti-alert-circle",{fontSize:16,color:"var(--da)",flexShrink:0}),
              h("span",{style:{fontSize:14,color:"var(--da)",flex:1}},chatErr),
              h("button",{onClick:()=>setCE(null),style:{border:"none",background:"transparent",color:"var(--da)",cursor:"pointer",fontSize:16,padding:0}},"✕")
            ),
            h("div",{style:{padding:"14px 18px",borderTop:"1px solid var(--bd)",display:"flex",gap:10}},
              h("input",{type:"text",value:inp,onChange:e=>setInp(e.target.value),onKeyDown:e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}},placeholder:"Ask your mentor…",disabled:cLoad,style:{flex:1,fontSize:15}}),
              h("button",{className:"pb",onClick:send,disabled:cLoad||!inp.trim()},cLoad?"…":"Send")
            )
          ),
          h("div",{style:{marginTop:14,display:"flex",flexWrap:"wrap",gap:8}},
            ["What should I focus on this week?",`What's hardest about month ${curI+1}?`,"Am I on track for Jan 10?","What will interviewers ask me?"]
            .map(p=>h("button",{key:p,className:"pill",onClick:()=>setInp(p),style:{padding:"8px 14px",background:"transparent",border:"1px solid var(--bd)",borderRadius:r,color:"var(--t2)",fontSize:13,cursor:"pointer",fontFamily:fn}},p))
          )
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
